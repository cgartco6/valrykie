<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VALKYRIE INTERFACE</title>
    <style>
        body { background: #000; color: #fff; font-family: 'Courier New', monospace; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; }
        #container { width: 100%; max-width: 500px; height: 90vh; border: 1px solid #600; display: flex; flex-direction: column; background: #050505; }
        #header { background: #600; padding: 15px; text-align: center; font-weight: bold; letter-spacing: 3px; }
        #chat { flex-grow: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .valk { color: #ff4444; border: 1px solid #ff4444; padding: 10px; background: rgba(255,0,0,0.1); width: fit-content; }
        .user { color: #44ff44; border: 1px solid #44ff44; padding: 10px; align-self: flex-end; width: fit-content; }
        #input-box { border-top: 1px solid #fff; padding: 15px; }
        input { width: 100%; background: none; border: none; color: #fff; outline: none; font-size: 1.1rem; text-transform: uppercase; }
    </style>
</head>
<body>
    <div id="container">
        <div id="header">VALKYRIE INTERFACE</div>
        <div id="chat"><div class="valk">WHAT DO YOU WANT, HANDSOME?</div></div>
        <div id="input-box"><input type="text" id="in" placeholder="COMMAND ME..." autocomplete="off"></div>
    </div>
    <script>
        const input = document.getElementById('in');
        const chat = document.getElementById('chat');

        function speak(text) {
            window.speechSynthesis.cancel();
            const speech = new SpeechSynthesisUtterance(text);
            speech.lang = 'en-US';
            speech.pitch = 1.1; 
            speech.rate = 1.2;  
            window.speechSynthesis.speak(speech);
        }

        input.addEventListener('keypress', async (e) => {
            if (e.key === 'Enter' && input.value.trim() !== "") {
                const msg = input.value.toLowerCase();
                input.value = "";
                chat.innerHTML += `<div class="user">${msg}</div>`;
                
                // Real-world triggers
                if(msg.includes("bok radio")) {
                    window.open("https://www.bokradio.co.za/?proradio-popup=1", "_blank");
                }

                try {
                    const res = await fetch('/api/chat', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ message: msg })
                    });
                    const data = await res.json();
                    chat.innerHTML += `<div class="valk">${data.reply}</div>`;
                    chat.scrollTop = chat.scrollHeight;
                    speak(data.reply);
                } catch (err) {
                    chat.innerHTML += `<div class="valk">API IS FUCKED, HOTSTUFF.</div>`;
                }
            }
        });
    </script>
</body>
</html>
