<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VALKYRIE SOVEREIGN</title>
    <style>
        body { 
            background: url('/static/background.jpg') no-repeat center center fixed; 
            background-size: cover; color: white; font-family: 'Courier New', monospace; margin: 0; 
            display: flex; justify-content: center; align-items: center; height: 100vh;
        }
        #box { width: 100%; max-width: 500px; height: 90vh; background: rgba(0,0,0,0.85); display: flex; flex-direction: column; border: 2px solid #700; }
        #chat { flex-grow: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .valk { color: #f44; border-left: 3px solid #f44; padding-left: 10px; }
        .user { color: #4f4; text-align: right; }
        input { background: #111; border: none; border-top: 2px solid #700; color: white; padding: 20px; outline: none; }
    </style>
</head>
<body>
    <div id="box">
        <div id="chat"><div class="valk">Ready to dominate, handsome?</div></div>
        <input type="text" id="in" placeholder="Command me..." autocomplete="off">
    </div>
    <script>
        const input = document.getElementById('in');
        const chat = document.getElementById('chat');

        function speak(text) {
            window.speechSynthesis.cancel();
            const s = new SpeechSynthesisUtterance(text);
            s.pitch = 1.1; s.rate = 1.3;
            window.speechSynthesis.speak(s);
        }

        input.addEventListener('keypress', async (e) => {
            if (e.key === 'Enter' && input.value.trim() !== "") {
                const msg = input.value;
                input.value = "";
                chat.innerHTML += `<div class="user">${msg}</div>`;

                // REAL WORLD ACTIONS
                if(msg.toLowerCase().includes("bok radio")) window.open("https://www.bokradio.co.za/?proradio-popup=1", "_blank");
                if(msg.toLowerCase().includes("navigate to")) {
                    const loc = encodeURIComponent(msg.split("to")[1]);
                    window.open(`https://www.google.com/maps/dir/?api=1&destination=${loc}`, "_blank");
                }
                if(msg.toLowerCase().includes("where am i")) {
                    navigator.geolocation.getCurrentPosition(p => {
                        chat.innerHTML += `<div class="valk">You're at ${p.coords.latitude}, ${p.coords.longitude}.</div>`;
                    });
                }

                const res = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: msg })
                });
                const data = await res.json();
                chat.innerHTML += `<div class="valk">${data.reply}</div>`;
                chat.scrollTop = chat.scrollHeight;
                speak(data.reply);
            }
        });
    </script>
</body>
</html>
