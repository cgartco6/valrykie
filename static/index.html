<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VALKYRIE SOVEREIGN</title>
    <style>
        body {
            background: url('/static/background.jpg') no-repeat center center fixed; /* Fixed path for Vercel */
            background-size: cover;
            color: #fff;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        #chat-container {
            width: 400px;
            height: 600px;
            background: rgba(0, 0, 0, 0.85);
            border: 2px solid #600;
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 20px #f00;
        }

        #header {
            padding: 10px;
            background: #600;
            text-align: center;
            font-weight: bold;
            letter-spacing: 2px;
        }

        #chat-box {
            flex-grow: 1;
            overflow-y: auto;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .msg {
            padding: 8px 12px;
            border-radius: 4px;
            max-width: 80%;
        }

        .user {
            align-self: flex-end;
            background: #222;
            color: #0f0;
            border: 1px solid #0f0;
        }

        .valkyrie {
            align-self: flex-start;
            background: #300;
            color: #f00;
            border: 1px solid #f00;
        }

        input {
            width: 100%;
            padding: 15px;
            background: #111;
            border: none;
            border-top: 2px solid #600;
            color: #fff;
            outline: none;
            box-sizing: border-box;
        }
    </style>
</head>
<body>

    <audio id="viking-sound" src="/static/sound.mp3"></audio>

    <div id="chat-container">
        <div id="header">VALKYRIE INTERFACE</div>
        <div id="chat-box">
            <div class="msg valkyrie">What the fuck do you want now, handsome?</div>
        </div>
