<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VALKYRIE COMMAND</title>
    <style>
        body { background: #000 url('/static/background.jpg') no-repeat center center fixed; background-size: cover; color: white; font-family: 'Courier New', monospace; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; }
        #box { width: 100%; max-width: 500px; height: 95vh; background: rgba(0,0,0,0.85); display: flex; flex-direction: column; border: 2px solid #f00; }
        #chat { flex-grow: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        input { background: #111; border: none; border-top: 2px solid #600; color: white; padding: 20px; outline: none; }
        #mood-tag { color: yellow; font-size: 0.8rem; }
    </style>
</head>
<body>
    <div id="box">
        <div style="background:#600;padding:10px;display:flex;justify-content:space-between;">
            <span>VALKYRIE SOVEREIGN</span><span id="mood-tag">MOOD: STABLE</span>
        </div>
        <div id="chat"><div style="color:#f44;border-left:3px solid #f44;padding-left:10px;">What do you want, handsome?</div></div>
        <input type="text" id="in" placeholder="COMMAND ME..." autocomplete="off">
    </div>
    <script>
        const input = document.getElementById('in');
        const chat = document.getElementById('chat');
        const moodTag = document.getElementById('mood-tag');

        input.addEventListener('keypress', async (e) => {
            if (e.key === 'Enter' && input.value.trim() !== "") {
                const msg = input.value; input.value = "";
                chat.innerHTML += `<div style="color:#4f4;text-align:right;">${msg}</div>`;

                if(msg.toLowerCase().includes("track me")) {
                    navigator.geolocation.getCurrentPosition(p => {
                        chat.innerHTML += `<div style="color:#f44;border-left:3px solid #f44;padding-left:10px;">GPS: ${p.coords.latitude}, ${p.coords.longitude}</div>`;
                    });
                }

                const res = await fetch('/api/chat', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ message: msg }) });
                const data = await res.json();
                moodTag.innerText = `MOOD: ${data.mood}`;
                chat.innerHTML += `<div style="color:#f44;border-left:3px solid #f44;padding-left:10px;">${data.reply}</div>`;
                chat.scrollTop = chat.scrollHeight;
            }
        });
    </script>
</body>
</html>
